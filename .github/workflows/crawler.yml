name: OVERLEI Continuous Civic Harvester

# This tells GitHub exactly when to run your script
on:
  schedule:
    # Runs every 30 minutes using a standard cron-timer expression
    - cron: '*/30 * * * *'
  # This button lets you manually trigger the script from GitHub.com anytime you want to test it
  workflow_dispatch:

jobs:
  harvest-and-sync:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Securely copy your code into the cloud container
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Set up a clean, isolated Python environment
    - name: Initialize Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Step 3: Install the exact code libraries your script relies on
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests supabase

    # Step 4: Run the crawler script and securely inject your repository secret
    - name: Execute Live Civic Harvester
      env:
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python harvest_civic_data.py