<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVERLEI Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body id="app-body" class="bg-slate-50 text-slate-800 antialiased">

    <header id="app-header" class="fixed top-0 left-0 right-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-400">
        <div class="max-w-md mx-auto px-4 pt-3 pb-3 space-y-3">
            
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-sm font-extrabold tracking-wider text-indigo-600 uppercase">OVERLEI</h1>
                    <p class="text-[11px] text-slate-500 font-medium mt-0.5">Dynamic Cross-Filtering Engine v3.0</p>
                </div>
                
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="mode-toggle" class="sr-only peer" onchange="toggleSecurityTier(this.checked)">
                    <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-focus:outline-none peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600"></div>
                    <span class="ml-2 text-[11px] font-bold text-slate-600 uppercase tracking-wide" id="tier-label">Visitor</span>
                </label>
            </div>

            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">1. Select Region</span>
                <div class="overflow-x-auto flex gap-1.5 pb-0.5 no-scrollbar" id="neighborhood-bar">
                    <button onclick="setNeighborhood(null)" id="nb-all" class="nb-btn px-3 py-1 rounded-lg border border-indigo-200 bg-indigo-50 text-[11px] font-bold text-indigo-700 shrink-0 transition-all">All Regions</button>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">2. Filter Assets</span>
                <div class="overflow-x-auto flex gap-1.5 pb-0.5 no-scrollbar">
                    <button onclick="toggleAmenity('has_public_bathroom')" class="amenity-btn px-2.5 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 shrink-0 transition-all" data-amenity="has_public_bathroom">🚾 Restroom</button>
                    <button onclick="toggleAmenity('has_wifi')" class="amenity-btn px-2.5 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 shrink-0 transition-all" data-amenity="has_wifi">📶 Wi-Fi</button>
                    <button onclick="toggleTag('traffic_bottleneck')" class="tag-btn px-2.5 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 shrink-0 transition-all" data-tag="traffic_bottleneck">🚗 Traffic Alert</button>
                    <button onclick="toggleTag('high_surf')" class="tag-btn px-2.5 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 shrink-0 transition-all" data-tag="high_surf">🌊 Surf Alert</button>
                    <button onclick="toggleTag('country_market')" class="tag-btn px-2.5 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 shrink-0 transition-all" data-tag="country_market">🎵 Markets/Events</button>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">3. Optimize By Matrix</span>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setSortMetric('default')" id="sort-default" class="sort-btn py-1 rounded-lg border border-slate-200 bg-slate-100 text-[11px] font-bold text-slate-700 transition-all">📋 Alphabetical</button>
                    <button onclick="setSortMetric('parking')" id="sort-parking" class="sort-btn py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-500 transition-all">🅿️ Best Parking</button>
                    <button onclick="setSortMetric('congestion')" id="sort-congestion" class="sort-btn py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-500 transition-all">🟢 Lowest Traffic</button>
                </div>
            </div>

        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pt-56 pb-24">
        <div id="loading-state" class="text-center text-slate-400 text-sm py-10 animate-pulse font-medium">Computing Live Matrix Metrics...</div>
        <section id="places-container" class="space-y-4"></section>
    </main>

    <script>
        const SUPABASE_URL = 'https://bmcyrwunrhepkfofalbr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3vaRkygvkHqQKDUrkiMinQ_nbZnxbFd'; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let rawPlaces = [];
        let rawLogs = [];
        
        let selectedNeighborhood = null;
        let activeAmenities = [];
        let activeTags = [];
        let activeSort = 'default'; 
        let isLocalMode = false;

        async function loadEcosystem() {
            try {
                const { data: places, error: pErr } = await db.from('master_places').select('*').order('name');
                const { data: logs, error: lErr } = await db.from('newspaper_logs').select('*').order('log_date', { ascending: false });
                
                if (pErr || lErr) throw new Error("Cloud synchronization interrupted.");

                rawPlaces = places;
                rawLogs = logs;
                
                document.getElementById('loading-state').style.display = 'none';
                generateNeighborhoodChips();
                renderUI();
            } catch (error) {
                console.error(error);
                document.getElementById('loading-state').innerText = "⚠️ Cloud sync error. Verify configurations.";
            }
        }

        function generateNeighborhoodChips() {
            const bar = document.getElementById('neighborhood-bar');
            const uniqueNeighborhoods = [...new Set(rawPlaces.map(p => p.neighborhood_slug))].sort();
            
            uniqueNeighborhoods.forEach(slug => {
                const displayLabel = slug.replace('-', ' ');
                bar.innerHTML += `
                    <button onclick="setNeighborhood('${slug}')" id="nb-${slug}" class="nb-btn px-3 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 uppercase tracking-wide shrink-0 transition-all">
                        ${displayLabel}
                    </button>
                `;
            });
        }

        function setNeighborhood(slug) {
            selectedNeighborhood = slug;
            document.querySelectorAll('.nb-btn').forEach(btn => {
                btn.className = isLocalMode 
                    ? "nb-btn px-3 py-1 rounded-lg border-emerald-800/10 bg-emerald-900/10 text-[11px] font-semibold text-emerald-700 uppercase tracking-wide shrink-0 transition-all"
                    : "nb-btn px-3 py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-600 uppercase tracking-wide shrink-0 transition-all";
            });
            const activeId = slug ? `nb-${slug}` : 'nb-all';
            document.getElementById(activeId).className = isLocalMode
                ? "nb-btn px-3 py-1 rounded-lg border border-emerald-600 bg-emerald-600 text-[11px] font-bold text-white uppercase tracking-wide shrink-0 transition-all"
                : "nb-btn px-3 py-1 rounded-lg border border-indigo-200 bg-indigo-50 text-[11px] font-bold text-indigo-700 uppercase tracking-wide shrink-0 transition-all";
            renderUI();
        }

        function toggleAmenity(field) {
            const activeColor = isLocalMode ? 'bg-emerald-600 border-emerald-600' : 'bg-indigo-600 border-indigo-600';
            const inactiveColor = isLocalMode ? 'border-emerald-800/10 bg-emerald-900/10 text-emerald-700' : 'border-slate-200 bg-slate-50 text-slate-600';

            if (activeAmenities.includes(field)) {
                activeAmenities = activeAmenities.filter(a => a !== field);
                document.querySelector(`[data-amenity="${field}"]`).className = `amenity-btn px-2.5 py-1 rounded-lg ${inactiveColor} text-[11px] font-semibold shrink-0 transition-all`;
            } else {
                activeAmenities.push(field);
                document.querySelector(`[data-amenity="${field}"]`).className = `amenity-btn px-2.5 py-1 rounded-lg ${activeColor} text-[11px] font-bold text-white shrink-0 transition-all`;
            }
            renderUI();
        }

        function toggleTag(tag) {
            const activeColor = isLocalMode ? 'bg-emerald-600 border-emerald-600' : 'bg-indigo-600 border-indigo-600';
            const inactiveColor = isLocalMode ? 'border-emerald-800/10 bg-emerald-900/10 text-emerald-700' : 'border-slate-200 bg-slate-50 text-slate-600';

            if (activeTags.includes(tag)) {
                activeTags = activeTags.filter(t => t !== tag);
                document.querySelector(`[data-tag="${tag}"]`).className = `tag-btn px-2.5 py-1 rounded-lg ${inactiveColor} text-[11px] font-semibold shrink-0 transition-all`;
            } else {
                activeTags.push(tag);
                document.querySelector(`[data-tag="${tag}"]`).className = `tag-btn px-2.5 py-1 rounded-lg ${activeColor} text-[11px] font-bold text-white shrink-0 transition-all`;
            }
            renderUI();
        }

        function setSortMetric(metric) {
            activeSort = metric;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.className = isLocalMode
                    ? "sort-btn py-1 rounded-lg border-emerald-800/10 bg-emerald-900/10 text-[11px] font-semibold text-emerald-700 transition-all"
                    : "sort-btn py-1 rounded-lg border border-slate-200 bg-slate-50 text-[11px] font-semibold text-slate-500 transition-all";
            });
            
            if (metric === 'default') {
                document.getElementById('sort-default').className = isLocalMode 
                    ? "sort-btn py-1 rounded-lg border border-emerald-600 bg-emerald-600/20 text-[11px] font-bold text-emerald-800 transition-all"
                    : "sort-btn py-1 rounded-lg border border-slate-200 bg-slate-100 text-[11px] font-bold text-slate-700 transition-all";
            }
            if (metric === 'parking') {
                document.getElementById('sort-parking').className = "sort-btn py-1 rounded-lg border border-emerald-200 bg-emerald-50 text-[11px] font-bold text-emerald-700 transition-all";
            }
            if (metric === 'congestion') {
                document.getElementById('sort-congestion').className = "sort-btn py-1 rounded-lg border border-sky-200 bg-sky-50 text-[11px] font-bold text-sky-700 transition-all";
            }
            renderUI();
        }

        // CONDITIONAL RENDERING VISIBILITY FILTERS
        function renderUI() {
            const container = document.getElementById('places-container');
            container.innerHTML = ''; 

            let processedPlaces = rawPlaces.filter(place => {
                if (selectedNeighborhood && place.neighborhood_slug !== selectedNeighborhood) return false;
                for (let amenity of activeAmenities) {
                    if (place[amenity] !== true) return false;
                }
                const placeLogs = rawLogs.filter(log => log.target_place_id === place.place_id);
                for (let requiredTag of activeTags) {
                    const hasTag = placeLogs.some(log => log.event_tags && log.event_tags.includes(requiredTag));
                    if (!hasTag) return false;
                }
                return true;
            });

            processedPlaces.sort((a, b) => {
                const logsA = rawLogs.filter(log => log.target_place_id === a.place_id);
                const logsB = rawLogs.filter(log => log.target_place_id === b.place_id);
                const latestA = logsA[0] || {};
                const latestB = logsB[0] || {};

                if (activeSort === 'parking') {
                    return (latestB.parking_metric || 0) - (latestA.parking_metric || 0);
                }
                if (activeSort === 'congestion') {
                    return (latestA.congestion_metric || 99) - (latestB.congestion_metric || 99);
                }
                return a.name.localeCompare(b.name);
            });

            processedPlaces.forEach(place => {
                const placeLogs = rawLogs.filter(log => log.target_place_id === place.place_id);
                const latestLog = placeLogs[0] || {};
                const traffic = latestLog.congestion_metric ? `${latestLog.congestion_metric}/10` : '--';
                const parking = latestLog.parking_metric ? `${latestLog.parking_metric}/10` : '--';

                // RESTRICTED SELECTIVE GAS BLOCK LOGIC
                const isGasCard = place.category.toLowerCase().includes('gas') || 
                                  place.name.toLowerCase().includes('gas') || 
                                  place.name.toLowerCase().includes('station');
                
                let gasHTML = '';
                if (isGasCard) {
                    const gasVal = latestLog.state_gas_average || 4.35;
                    // Intentionally setting hard bounds comparison parameters instead of scraping raw inputs
                    const tendencyHTML = gasVal > 4.30 
                        ? '<span class="text-amber-600 font-bold">▲ Above Avg</span>' 
                        : '<span class="text-emerald-600 font-bold">▼ Below Avg</span>';
                    
                    gasHTML = `
                    <div class="text-slate-500 flex items-center gap-1.5 bg-slate-50 border border-slate-100 rounded-lg px-2 py-1 shadow-sm">
                        <span>⛽ Fuel:</span>
                        <span class="text-slate-800 font-bold">$${gasVal}/gal</span>
                        <span class="text-[10px] bg-white border px-1.5 py-0.5 rounded">${tendencyHTML}</span>
                    </div>`;
                }

                const cardHTML = `
                <div class="rounded-2xl border ${isLocalMode ? 'border-emerald-200 bg-emerald-50/20' : 'border-slate-200 bg-white'} p-4 shadow-sm space-y-3 transition-all">
                    <div class="flex items-start justify-between">
                        <div>
                            <span class="text-[10px] font-bold tracking-widest ${isLocalMode ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-indigo-700 bg-indigo-50 border-indigo-100'} uppercase border px-2 py-0.5 rounded-md">${place.neighborhood_slug}</span>
                            <h2 class="text-base font-bold text-slate-900 mt-1.5">${place.name}</h2>
                            <p class="text-xs font-medium text-slate-500">${place.category}</p>
                        </div>
                        <div class="flex items-center gap-1">
                            ${place.has_public_bathroom ? '<span class="inline-flex items-center justify-center h-7 w-7 rounded-lg bg-slate-100 text-sm border border-slate-200 shadow-sm" title="Restroom">🚾</span>' : ''}
                            ${place.has_wifi ? '<span class="inline-flex items-center justify-center h-7 w-7 rounded-lg bg-slate-100 text-sm border border-slate-200 shadow-sm" title="Wi-Fi">📶</span>' : ''}
                        </div>
                    </div>

                    ${placeLogs.length > 0 ? `
                    <div class="border-t border-slate-100 pt-3 space-y-2.5">
                        ${placeLogs.map(log => `
                            <div class="rounded-xl ${log.source_type !== 'print_archive' ? 'bg-amber-50 border-amber-200' : (isLocalMode ? 'bg-white border-emerald-200' : 'bg-slate-50 border-slate-200')} border p-3 text-xs shadow-sm">
                                <div class="flex items-center justify-between font-bold ${log.source_type !== 'print_archive' ? 'text-amber-700' : 'text-slate-600'}">
                                    <span class="uppercase tracking-wider text-[10px]">${log.source_type === 'print_archive' ? '📰 Print Archive' : '⚠️ Live Gov Feed'}</span>
                                    <span>${new Date(log.log_date).toLocaleDateString()}</span>
                                </div>
                                <p class="${log.source_type !== 'print_archive' ? 'text-amber-900' : 'text-slate-700'} mt-1.5 leading-relaxed font-medium">${log.extracted_insight}</p>
                                <div class="flex flex-wrap items-center gap-1.5 mt-2.5">
                                    ${(log.event_tags || []).map(tag => `<span class="px-2 py-1 rounded-md bg-white border font-bold text-[9px] uppercase shadow-sm">${tag.replace('_', ' ')}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ` : '<div class="border-t border-slate-100 pt-2 pb-1"><p class="text-xs text-slate-400 italic font-medium">No real-time analytics registered for this asset coordinate.</p></div>'}

                    <div class="flex items-center justify-between border-t border-slate-100 pt-3 text-[11px] text-slate-500 font-semibold">
                        <div class="flex gap-4">
                            <span>🚗 Traffic: <strong class="${latestLog.congestion_metric > 7 ? 'text-rose-500' : 'text-slate-700'} font-bold">${traffic}</strong></span>
                            <span>🅿️ Parking: <strong class="${latestLog.parking_metric > 6 ? 'text-emerald-600' : 'text-slate-700'} font-bold">${parking}</strong></span>
                        </div>
                        ${gasHTML}
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });
            
            if (processedPlaces.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-xs font-medium text-slate-400 border border-dashed border-slate-200 rounded-2xl bg-white">Zero coordinates match this filtering matrix combination.</div>`;
            }
        }

        // THE WALLED GARDEN THEME SWITCHER ENGINE
        function toggleSecurityTier(isChecked) {
            isLocalMode = isChecked;
            
            const body = document.getElementById('app-body');
            const header = document.getElementById('app-header');
            const label = document.getElementById('tier-label');
            
            if (isLocalMode) {
                // Transition Entire DOM into 808 Local Walled Garden Theme (Muted Botanical Greens)
                body.className = "bg-emerald-50/30 text-slate-800 antialiased";
                header.className = "fixed top-0 left-0 right-0 z-50 border-b border-emerald-200 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-400";
                label.innerText = "808 Local Mode";
                label.className = "ml-2 text-[11px] font-bold text-emerald-600 uppercase tracking-wide";
            } else {
                // Return to clean Slate/Indigo themes
                body.className = "bg-slate-50 text-slate-800 antialiased";
                header.className = "fixed top-0 left-0 right-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-400";
                label.innerText = "Visitor";
                label.className = "ml-2 text-[11px] font-bold text-slate-600 uppercase tracking-wide";
            }
            
            // Re-render UI and styling states across current layers
            setSortMetric(activeSort);
        }

        window.onload = loadEcosystem;
    </script>
</body>
</html>
